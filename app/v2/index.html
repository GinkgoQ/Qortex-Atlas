<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Qortex Atlas</title>
<meta name="description" content="Qortex Atlas — explore, inspect, understand neurodata.">
<link rel="stylesheet" href="v2.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23e8ede9' stroke-width='1.6'/%3E%3Cpath fill='%2386c29a' d='M16 24c-6-.6-8-6.2-6-11 2.3 3.9 4.2 5.8 6 7 1.8-1.2 3.7-3.1 6-7 2 4.8 0 10.4-6 11z'/%3E%3C/svg%3E">
</head>
<body>

<a class="skip-link" href="#main">Skip to main content</a>

<!-- topographic contour backdrop — the "atlas" motif -->
<svg class="topo" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1400 900">
  <g fill="none" stroke="currentColor" stroke-width="1">
    <path d="M-50,720 C200,640 350,700 520,610 S900,560 1100,470 1350,420 1460,360"/>
    <path d="M-50,780 C220,700 380,760 560,670 S940,620 1140,530 1380,470 1460,420"/>
    <path d="M-50,840 C240,760 410,820 600,730 S980,680 1180,590 1410,520 1460,480"/>
    <path d="M-50,660 C180,580 320,640 480,550 S860,500 1060,410 1320,370 1460,300"/>
    <path d="M-50,600 C160,520 300,580 450,490 S820,440 1020,350 1290,320 1460,240"/>
    <circle cx="1150" cy="180" r="60"/><circle cx="1150" cy="180" r="105"/><circle cx="1150" cy="180" r="160"/>
    <circle cx="180" cy="160" r="45"/><circle cx="180" cy="160" r="85"/>
  </g>
</svg>

<div class="app">

  <!-- ================= sidebar ================= -->
  <nav class="side" aria-label="Primary">
    <a class="side-brand" href="#/">
      <span class="qmark" aria-hidden="true">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" fill="none" stroke="currentColor" stroke-width="1.5"/><path class="qleaf" d="M17 25.5c-6.4-.7-8.5-6.6-6.4-11.7 2.5 4.1 4.5 6.1 6.4 7.4 1.9-1.3 3.9-3.3 6.4-7.4 2.1 5.1 0 11-6.4 11.7z"/><path d="M22.5 26.5l4 4.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="side-brand-name">Qortex</span>
    </a>

    <ul class="side-nav" id="side-nav">
      <li><a href="#/" data-nav="atlas"><i class="ic" data-ic="atlas"></i>Atlas</a></li>
      <li><a href="#/datasets" data-nav="datasets"><i class="ic" data-ic="stack"></i>Datasets</a></li>
      <li><a href="#/ds/ds000117/bids" data-nav="bids"><i class="ic" data-ic="tree"></i>BIDS</a></li>
      <li><a href="#/ds/ds000117/quality" data-nav="quality"><i class="ic" data-ic="shield"></i>Quality</a></li>
      <li><a href="#/ds/ds000117/viewer" data-nav="viewer"><i class="ic" data-ic="eye"></i>Viewer</a></li>
      <li><a href="#/ds/ds000117/overview" data-nav="modalities"><i class="ic" data-ic="waves"></i>Modalities</a></li>
      <li><a href="#/ds/ds000117/cohort" data-nav="cohorts"><i class="ic" data-ic="people"></i>Cohorts</a></li>
      <li><a href="#/ds/ds000117/graph" data-nav="graph"><i class="ic" data-ic="graph"></i>Graph</a></li>
      <li><a href="#/jobs" data-nav="jobs"><i class="ic" data-ic="pulse"></i>Jobs</a></li>
    </ul>

    <div class="side-foot">
      <a href="#/settings" data-nav="settings"><i class="ic" data-ic="gear"></i>Settings</a>
    </div>
  </nav>

  <!-- ================= topbar ================= -->
  <header class="top">
    <div class="top-ctx">
      <span class="top-source">OpenNeuro</span>
      <span class="top-source-dot" title="Connected to local Atlas store">ⓘ</span>
    </div>
    <button class="top-search" id="search-btn" aria-haspopup="dialog" aria-keyshortcuts="Control+K Meta+K">
      <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><circle cx="7" cy="7" r="4.6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Search datasets, tasks, modalities…</span>
      <kbd>⌘K</kbd>
    </button>
    <div class="top-right">
      <button class="tbtn" id="theme-btn" aria-label="Toggle light theme">◐</button>
      <button class="tbtn" id="bell-btn" aria-label="Notifications">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path d="M8 2a4 4 0 0 0-4 4v3l-1.3 2h10.6L12 9V6a4 4 0 0 0-4-4z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6.7 13.4a1.5 1.5 0 0 0 2.6 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <span class="avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.3"/><path fill="currentColor" d="M12 17c-4.3-.5-5.7-4.4-4.3-7.8 1.7 2.8 3 4.1 4.3 5 1.3-.9 2.6-2.2 4.3-5 1.4 3.4 0 7.3-4.3 7.8z"/></svg>
      </span>
    </div>
  </header>

  <!-- ================= main ================= -->
  <main class="main" id="main" tabindex="-1"></main>
</div>

<div id="live" class="visually-hidden" aria-live="polite"></div>
<div class="toasts" id="toasts"></div>

<!-- command palette -->
<div class="veil" id="cmdk" hidden>
  <div class="palette" role="dialog" aria-modal="true" aria-label="Search">
    <input id="cmdk-in" type="text" placeholder="Search datasets, tasks, modalities…" autocomplete="off" spellcheck="false"
           role="combobox" aria-expanded="true" aria-controls="cmdk-out" aria-activedescendant="">
    <ul id="cmdk-out" role="listbox"></ul>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
